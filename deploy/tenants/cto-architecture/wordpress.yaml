---

apiVersion: fervid.us/v1alpha1
kind: SQLClaim
metadata:
  name: wordpress-db
spec:
  id: wordpress-db
  compositionSelector:
    matchLabels:
      provider: aws
      db: postgresql
  parameters:
    version: "13"
    size: small
    databases:
      - wordpress-db
