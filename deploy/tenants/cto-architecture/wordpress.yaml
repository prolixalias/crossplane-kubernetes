---

apiVersion: fervid.us/v1alpha1
kind: ClusterClaim
metadata:
  name: cluster-01
spec:
  id: cluster-01
  compositionSelector:
    matchLabels:
      provider: aws
      cluster: eks
  parameters:
    nodeSize: small
    minNodeCount: 3

---

apiVersion: v1
kind: Secret
metadata:
  name: wordpress-db-credentials
data:
  password: cG9zdGdyZXM=

