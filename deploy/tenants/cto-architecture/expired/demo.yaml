---

apiVersion: fervid.us/v1alpha1
kind: ClusterClaim
metadata:
  name: cluster-demo
spec:
  id: cluster-01
  compositionSelector:
    matchLabels:
      provider: aws
      cluster: eks
  parameters:
    nodeSize: small
    minNodeCount: 3

---

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
data:
  password: bXlzcWw=

---

apiVersion: fervid.us/v1alpha1
kind: SQLClaim
metadata:
  name: demo
  namespace: cto-architecture
spec:
  id: demo
  compositionSelector:
    matchLabels:
      provider: aws
      db: postgresql
  parameters:
    version: \"13.4\"
    size: small
    namespace: cto-architecture
  writeConnectionSecretToRef:
    name: demo
